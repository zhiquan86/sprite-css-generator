<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSD Sprite CSS Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle { font-size: 13px; color: #718096; margin-bottom: 36px; }

    /* ── Steps ── */
    .steps {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 720px;
      margin-bottom: 28px;
    }
    .step { display: flex; align-items: center; gap: 8px; flex: 1; }
    .step-num {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid #2d3748;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #4a5568; flex-shrink: 0;
      transition: all .3s;
    }
    .step-label { font-size: 12px; color: #4a5568; transition: color .3s; white-space: nowrap; }
    .step-line { flex: 1; height: 2px; background: #2d3748; margin: 0 8px; transition: background .3s; }
    .step.active .step-num  { border-color: #667eea; background: #667eea22; color: #667eea; }
    .step.active .step-label { color: #667eea; }
    .step.done   .step-num  { border-color: #68d391; background: #68d39122; color: #68d391; }
    .step.done   .step-label { color: #68d391; }
    .step.done + .step-line { background: #68d39166; }

    /* ── Drop Zone ── */
    .drop-zone {
      width: 100%; max-width: 720px;
      border: 2px dashed #4a5568; border-radius: 16px;
      padding: 56px 20px; text-align: center; cursor: pointer;
      transition: all .2s; background: #1a1d27; position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #667eea; background: #1e2035; }
    .drop-zone.has-file { border-color: #68d391; background: #1a2520; padding: 24px; }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon { font-size: 44px; margin-bottom: 12px; }
    .drop-zone > p { font-size: 15px; color: #a0aec0; }
    .drop-zone span { color: #667eea; font-weight: 600; }
    .drop-hint { font-size: 12px; color: #4a5568; margin-top: 6px; }

    #fileInfo { display: none; }
    .file-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .file-item {
      display: flex; align-items: center; gap: 8px;
      background: #0f1117; border: 1px solid #2d3748; border-radius: 8px; padding: 8px 12px;
    }
    .file-item-icon { font-size: 20px; }
    .file-item-name { font-size: 13px; font-weight: 600; color: #68d391; }
    .file-item-size { font-size: 11px; color: #718096; }
    .file-reselect { font-size: 12px; color: #4a5568; margin-top: 10px; text-decoration: underline; cursor: pointer; display: none; }

    /* ── Config Panel ── */
    .config-panel {
      width: 100%; max-width: 720px; margin-top: 20px;
      background: #1a1d27; border-radius: 16px; border: 1px solid #2d3748;
      padding: 24px; display: none; flex-direction: column; gap: 20px;
    }
    .config-panel.visible { display: flex; }
    .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 7px; }
    .field label { font-size: 12px; color: #718096; font-weight: 500; }
    .field select, .field input[type="text"], .field input[type="number"] {
      background: #0f1117; border: 1px solid #2d3748; border-radius: 8px;
      color: #e2e8f0; padding: 9px 12px; font-size: 13px; outline: none;
      transition: border-color .2s; width: 100%;
    }
    .field select:focus, .field input:focus { border-color: #667eea; }

    .unit-selector { display: flex; gap: 6px; }
    .unit-btn {
      flex: 1; padding: 9px 0; background: #0f1117;
      border: 1px solid #2d3748; border-radius: 8px;
      color: #718096; font-size: 13px; cursor: pointer;
      transition: all .2s; text-align: center;
    }
    .unit-btn.active { background: #667eea22; border-color: #667eea; color: #667eea; font-weight: 600; }

    .btn-generate {
      width: 100%; background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; border: none; border-radius: 10px;
      padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity .2s, transform .1s; letter-spacing: .03em;
    }
    .btn-generate:hover { opacity: .9; }
    .btn-generate:active { transform: scale(.98); }
    .btn-generate:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Progress ── */
    .progress-area { width: 100%; max-width: 720px; margin-top: 20px; display: none; }
    .progress-bar-wrap { background: #1a1d27; border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg,#667eea,#764ba2); border-radius: 99px; transition: width .3s; }
    .progress-text { font-size: 13px; color: #718096; margin-top: 8px; text-align: center; }

    /* ── Error ── */
    .error-msg {
      width: 100%; max-width: 720px;
      background: #2d1515; border: 1px solid #742a2a; border-radius: 10px;
      padding: 14px 18px; color: #fc8181; font-size: 13px; margin-top: 16px; display: none;
    }

    /* ── Result ── */
    .result-area { width: 100%; max-width: 720px; margin-top: 24px; display: none; }
    .result-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .result-header h2 { font-size: 15px; font-weight: 600; }
    .result-meta { font-size: 12px; color: #718096; margin-top: 2px; }
    .result-actions { display: flex; gap: 8px; }

    .btn-download {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; border: none; border-radius: 8px;
      padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .2s;
    }
    .btn-download:hover { opacity: .85; }

    .btn-secondary {
      background: #1a1d27; color: #718096;
      border: 1px solid #2d3748; border-radius: 8px;
      padding: 9px 14px; font-size: 13px; cursor: pointer; transition: all .2s;
    }
    .btn-secondary:hover { border-color: #4a5568; color: #a0aec0; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
    .tab-btn {
      background: #1a1d27; border: 1px solid #2d3748; border-radius: 8px;
      color: #718096; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: all .2s;
    }
    .tab-btn.active { background: #667eea22; border-color: #667eea; color: #667eea; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* 格式选择 */
    .format-bar {
      display: flex; gap: 6px; margin-bottom: 10px;
    }
    .fmt-btn {
      padding: 5px 14px; background: #0f1117;
      border: 1px solid #2d3748; border-radius: 6px;
      color: #718096; font-size: 12px; cursor: pointer; transition: all .2s;
    }
    .fmt-btn.active { background: #667eea22; border-color: #667eea; color: #667eea; font-weight: 600; }

    /* 代码预览 */
    .code-wrap {
      position: relative;
    }
    .code-preview {
      background: #1a1d27; border: 1px solid #2d3748; border-radius: 12px;
      padding: 20px; font-family: "JetBrains Mono","Fira Code","Courier New",monospace;
      font-size: 12px; line-height: 1.8; color: #a0aec0;
      max-height: 400px; overflow-y: auto; white-space: pre;
    }
    .btn-copy-all {
      position: absolute; top: 10px; right: 10px;
      background: #2d3748; color: #a0aec0;
      border: none; border-radius: 6px; padding: 4px 10px;
      font-size: 11px; cursor: pointer; transition: all .2s;
    }
    .btn-copy-all:hover { background: #4a5568; color: #e2e8f0; }

    /* 高亮 */
    .hl-comment { color: #4a5568; }
    .hl-at      { color: #b794f4; }
    .hl-sel     { color: #68d391; }
    .hl-prop    { color: #63b3ed; }
    .hl-val     { color: #f6ad55; }
    .hl-bool    { color: #fc8181; }
    .hl-null    { color: #718096; }
    .hl-num     { color: #f6ad55; }

    /* 图层编辑表格 */
    .table-header {
      display: grid;
      grid-template-columns: 32px 1fr 1fr 52px 80px;
      gap: 8px; align-items: center;
      padding: 8px 12px;
      background: #0f1117; border-radius: 8px 8px 0 0;
      border: 1px solid #2d3748; border-bottom: none;
      font-size: 11px; color: #4a5568; font-weight: 600; text-transform: uppercase;
    }
    .check-all-wrap { display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .table-body {
      border: 1px solid #2d3748; border-radius: 0 0 10px 10px;
      max-height: 380px; overflow-y: auto;
    }
    .table-row {
      display: grid;
      grid-template-columns: 32px 1fr 1fr 52px 80px;
      gap: 8px; align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #1a1d27;
      background: #13151f;
      transition: background .15s;
    }
    .table-row:last-child { border-bottom: none; border-radius: 0 0 10px 10px; }
    .table-row:hover { background: #1a1d27; }
    .row-origname { font-size: 12px; color: #a0aec0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row-classname {
      background: #0f1117; border: 1px solid #2d3748; border-radius: 6px;
      color: #68d391; font-family: monospace; font-size: 12px;
      padding: 4px 8px; outline: none; width: 100%;
    }
    .row-classname:focus { border-color: #667eea; }
    .row-thumb { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    .row-thumb img { max-width: 40px; max-height: 40px; border-radius: 4px; border: 1px solid #2d3748; }
    .no-thumb { font-size: 11px; color: #2d3748; }
    .row-size { font-size: 11px; color: #718096; font-family: monospace; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }
  </style>
</head>
<body>

  <h1>PSD Sprite CSS Generator</h1>
  <p class="subtitle">上传 PSD / PSB，配置参数，生成雪碧图 CSS / SCSS / WXSS / JSON</p>

  <!-- Steps -->
  <div class="steps">
    <div class="step active" id="step1">
      <div class="step-num">1</div>
      <div class="step-label">上传文件</div>
    </div>
    <div class="step-line" id="line1"></div>
    <div class="step" id="step2">
      <div class="step-num">2</div>
      <div class="step-label">配置参数</div>
    </div>
    <div class="step-line" id="line2"></div>
    <div class="step" id="step3">
      <div class="step-num">3</div>
      <div class="step-label">导出代码</div>
    </div>
  </div>

  <!-- Step 1: 上传 -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".psd,.psb" multiple />
    <div id="dropDefault">
      <div class="drop-icon">📂</div>
      <p>拖拽 PSD / PSB 文件到此处，或<span>点击选择</span></p>
      <p class="drop-hint">支持 .psd .psb，可同时上传多个文件</p>
    </div>
    <div id="fileInfo">
      <div class="file-list" id="fileList"></div>
    </div>
    <p class="file-reselect" id="reselect">重新选择文件</p>
  </div>

  <!-- Step 2: 配置 -->
  <div class="config-panel" id="configPanel">
    <div class="config-grid">
      <div class="field">
        <label>图层范围</label>
        <select id="layerMode">
          <option value="all">所有图层（含组内）</option>
          <option value="visible">仅可见图层</option>
          <option value="top">仅顶层图层</option>
        </select>
      </div>
      <div class="field">
        <label>CSS 类名前缀</label>
        <input type="text" id="prefix" value="sprite-" />
      </div>
      <div class="field">
        <label>除数基数</label>
        <input type="number" id="divisor" value="100" min="1" step="1" />
      </div>
      <div class="field">
        <label>单位</label>
        <div class="unit-selector">
          <div class="unit-btn active" data-unit="rem">rem</div>
          <div class="unit-btn" data-unit="px">px</div>
          <div class="unit-btn" data-unit="vw">vw</div>
          <div class="unit-btn" data-unit="em">em</div>
        </div>
      </div>
    </div>
    <button class="btn-generate" id="btnGenerate">生成代码</button>
  </div>

  <!-- Progress -->
  <div class="progress-area" id="progressArea">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">正在解析...</p>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Step 3: 结果 -->
  <div class="result-area" id="resultArea">
    <div class="result-header">
      <div>
        <h2>生成完成</h2>
        <p class="result-meta" id="resultMeta"></p>
      </div>
      <div class="result-actions">
        <button class="btn-secondary" id="btnReset">重新配置</button>
        <button class="btn-download" id="btnDownload">下载文件</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="preview">代码预览</button>
      <button class="tab-btn" data-tab="layers">图层编辑</button>
    </div>

    <!-- 代码预览 Tab -->
    <div class="tab-panel active" id="tab-preview">
      <div class="format-bar">
        <div class="fmt-btn active" data-fmt="css">CSS</div>
        <div class="fmt-btn" data-fmt="scss">SCSS</div>
        <div class="fmt-btn" data-fmt="wxss">WXSS</div>
        <div class="fmt-btn" data-fmt="json">JSON</div>
      </div>
      <div class="code-wrap">
        <button class="btn-copy-all" id="btnCopyAll">复制全部</button>
        <div class="code-preview" id="codePreview"></div>
      </div>
    </div>

    <!-- 图层编辑 Tab -->
    <div class="tab-panel" id="tab-layers">
      <div id="layerTable"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
